- name: Ensure deploy group exists
  ansible.builtin.group:
    name: "{{ deploy_user_group }}"
    state: present
- name: Ensure deploy user exists
  ansible.builtin.user:
    name: "{{ deploy_user_name }}"
    group: "{{ deploy_user_group }}"
    home: "{{ deploy_user_home }}"
    shell: "{{deploy_user_shell }}"
    create_home: true
    state: present
- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ deploy_user_home }}/.ssh"
    state: directory
    owner: "{{ deploy_user_name }}"
    group: "{{ deploy_user_group }}"
    mode: "0700"
- name: Add authorized keys for deploy user
  ansible.posix.authorized_key:
    user: "{{ deploy_user_name }}"
    key: "{{ item }}"
    state: present
  loop: "{{ deploy_user_authorized_keys }}"
- name: Ensure service directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user_name }}"
    group: "{{ deploy_user_group }}"
    mode: "0755"
  loop: "{{ deploy_dirs }}"
