- name: Configuring dependencies on the server
  hosts: servers
  gather_facts: true
  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600


    - name: Install base packages
      ansible.builtin.apt:
        name:
          - wget
          - curl
          - git
          - python3
          - python3-pip
          - python3-venv
          - dnsutils
          - iptables
          - nftables
          - ufw
          - htop
        state: present
     
    - name: Set Docker apt architecture
      ansible.builtin.set_fact:
        docker_apt_arch: >-
          {{
            'amd64' if ansible_architecture in ['x86_64', 'amd64']
            else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
            else ansible_architecture
          }}

    - name: Install docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gnupg
        state: present

    - name: Ensure /etc/apt/keyprings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker apt repo key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present

    - name: Update apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker
      ansible.builtin.apt:
        - docker-ce
        - docker-ce-cli
        - containered.io
        - docker-buildx-plugin
        - docker-compose-plugin
      state: present

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        enabled: true
        syaye: present
